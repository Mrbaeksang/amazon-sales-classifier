name: Build Windows Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      RUN_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name "amazon-classifier" --add-data "src/default_master.json;." src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amazon-classifier-windows
          path: dist/amazon-classifier.exe

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RUN_NUMBER }}
          name: Release v${{ env.RUN_NUMBER }}
          files: dist/amazon-classifier.exe
          generate_release_notes: true
